name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade setuptools wheel
          pip install --upgrade buildozer cython==0.29.32
          pip install --upgrade p4a

      - name: Clear old build cache
        run: |
          rm -rf .buildozer/android/platform/build-* || true

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Build APK
        run: |
          buildozer -v android debug
        env:
          BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE: 1
          PYTHONOPTIMIZE: 0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YT-DLP-Downloader-APK
          path: bin/*.apk
