name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python 3.11.15
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.15'

      - name: Disable Microsoft package repos (workaround for 403/InRelease)
        run: |
          # Remove any packages.microsoft.com entries from apt sources to avoid apt-get update failing with 403/unsigned errors
          sudo find /etc/apt/sources.list.d -type f -name "*.list" -exec sudo sed -i.bak '/packages.microsoft.com/d' {} \; || true
          sudo sed -i.bak '/packages.microsoft.com/d' /etc/apt/sources.list || true
          # show any remaining references (for debugging); this will exit 0 even if none found
          sudo grep -R "packages.microsoft.com" /etc/apt || true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer and Cython (pinned)
        run: |
          pip install --upgrade buildozer cython==0.29.36

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Clean previous buildozer / p4a artifacts
        run: |
          # Remove platform build caches that can contain artifacts compiled
          # against a different Python version. This ensures a fresh p4a build.
          rm -rf .buildozer/android/platform || true
          rm -rf .buildozer/android/platform/python-for-android || true
          # Also run buildozer clean to clear metadata
          buildozer android clean || true

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YT-DLP-Downloader-APK
          path: bin/*.apk
